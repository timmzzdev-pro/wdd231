<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You | TmX De' Luxury</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main>

        <section style="text-align:center;">

            <h1>
                Thank You
            </h1>

            <p>
                Your message has been received.
            </p>

            <div id="results">
            </div>

            <p>

                <a href="index.html" class="btn">

                    Return Home

                </a>

            </p>

        </section>

    </main>

    <script>

        const params =
            new URLSearchParams(
                window.location.search
            );

        const results =
            document.querySelector("#results");

        results.innerHTML = `

<h3>Submitted Information</h3>

<p>
<strong>Name:</strong>
${params.get("fullname")}
</p>

<p>
<strong>Email:</strong>
${params.get("email")}
</p>

<p>
<strong>Phone:</strong>
${params.get("phone")}
</p>

<p>
<strong>Subject:</strong>
${params.get("subject")}
</p>

<p>
<strong>Message:</strong>
${params.get("message")}
</p>

`;

    </script>

</body>

</html>
