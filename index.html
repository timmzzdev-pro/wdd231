<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="WDD 231 Course Home Page">
    <meta name="author" content="Your Name">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WDD231 Home</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">

    <!-- JavaScript -->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/date.js" defer></script>
    <script src="scripts/courses.js" defer></script>
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.svg" alt="Site Logo" width="50" height="50">
            <span>Your Name</span>
        </div>

        <button id="menu"></button>

        <nav class="navigation">
            <a href="index.html" class="active">Home</a>
            <a href="#">Chamber</a>
            <a href="#">Final</a>
        </nav>
    </header>

    <main>
        <h1>Home</h1>

        <div class="main-grid">

            <section class="card">
                <h2>About Me</h2>
                <p>
                    I am a web development student passionate about frontend
                    development and responsive design. I enjoy building modern,
                    user-friendly websites using HTML, CSS, and JavaScript.
                </p>
            </section>

            <section class="card">
                <h2>Student Photo</h2>
                <img src="images/profile.webp" alt="Student Photo">
            </section>

        </div>

        <section class="courses-section">
            <h2>Web Certificate Courses</h2>

            <div class="buttons">
                <button id="all">All</button>
                <button id="cse">CSE</button>
                <button id="wdd">WDD</button>
            </div>

            <div id="courses"></div>

            <p class="credits">
                Total Credits: <span id="totalCredits"></span>
            </p>
        </section>

    </main>

    <footer>

        <div class="socials">
            <a href="https://linkedin.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn">
            </a>

            <a href="https://github.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub">
            </a>

            <a href="https://x.com" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="X">
            </a>
        </div>

        <p>
            &copy; <span id="currentyear"></span> | Your Name | Nigeria
        </p>

        <p id="lastModified"></p>

    </footer>

</body>

</html>
